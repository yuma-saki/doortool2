<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>建具作図ツール V110.0 - 決定版・仕様表修正済</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #eef2f3; padding: 20px; display: flex; flex-direction: column; align-items: center; margin: 0; }
        .container { width: 1650px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); display: grid; grid-template-columns: 420px 1fr; gap: 20px; }
        h1 { grid-column: 1 / -1; font-size: 18px; text-align: center; color: #2c3e50; border-bottom: 3px solid #e67e22; padding-bottom: 10px; margin-top:0; }
        .controls { display: flex; flex-direction: column; gap: 6px; max-height: 92vh; overflow-y: auto; padding-right: 15px; }
        .group { background: #fff5eb; padding: 10px; border-radius: 8px; border-left: 5px solid #e67e22; margin-bottom: 4px; }
        .group-title { font-size: 11px; color: #d35400; margin-bottom: 6px; text-transform: uppercase; font-weight: bold; border-bottom: 1px solid #ffdec0; }
        label { font-size: 11px; font-weight: bold; color: #333; display: block; margin-top: 4px; }
        input, select { width: 100%; padding: 5px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 13px; }
        
        .scale-btn-group { display: flex; gap: 2px; margin-top: 4px; }
        .btn-scale { flex: 1; padding: 3px 0; font-size: 10px; background: #fff; border: 1px solid #e67e22; color: #e67e22; border-radius: 4px; cursor: pointer; transition: 0.2s; }
        .btn-scale:hover { background: #e67e22; color: #fff; }

        .spec-row { display: grid; grid-template-columns: 80px 1fr 30px; gap: 5px; margin-bottom: 4px; }
        .text-row { display: grid; grid-template-columns: 1fr 45px 45px 25px 45px 45px 25px; gap: 3px; margin-bottom: 4px; align-items: center; }
        
        .btn-add { background: #27ae60; padding: 6px; font-size: 11px; margin-top: 5px; border: none; border-radius: 4px; color: white; cursor: pointer; width: 120px; }
        .btn-del { background: #e74c3c; padding: 2px 5px; font-size: 10px; border: none; border-radius: 4px; color: white; height: 24px; cursor: pointer; }
        
        .action-buttons { display: flex; flex-direction: column; gap: 5px; margin-top: 10px; }
        .row-btns { display: flex; gap: 5px; }
        .btn-main { flex: 1; padding: 12px; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; font-weight: bold; color: white; box-shadow: 0 4px 0 rgba(0,0,0,0.2); }
        .btn-orange { background: #e67e22; }
        .btn-blue { background: #3498db; }
        .btn-dark { background: #34495e; }
        .btn-gray { background: #95a5a6; }

        .preview-area { background: #dcdde1; display: grid; grid-template-columns: 1fr 40px; grid-template-rows: 1fr 40px; border: 2px solid #7f8fa6; position: relative; overflow: hidden; }
        .canvas-wrapper { grid-column: 1; grid-row: 1; display: flex; justify-content: center; align-items: center; overflow: hidden; background: #555; }
        canvas { background: white; box-shadow: 0 5px 15px rgba(0,0,0,0.2); cursor: grab; }
        
        .slider-v { grid-column: 2; grid-row: 1; display: flex; justify-content: center; padding: 20px 0; background: #f1f2f6; border-left: 1px solid #ccc; }
        .slider-h { grid-column: 1; grid-row: 2; display: flex; align-items: center; padding: 0 20px; background: #f1f2f6; border-top: 1px solid #ccc; }
        input[type=range] { cursor: pointer; }
        .slider-v input { writing-mode: bt-lr; appearance: slider-vertical; width: 8px; height: 100%; }
        .slider-h input { width: 100%; height: 8px; }

        .hint-badge { position: absolute; bottom: 50px; right: 50px; background: rgba(44, 62, 80, 0.85); color: white; padding: 8px 12px; border-radius: 6px; font-size: 12px; font-weight: bold; pointer-events: none; z-index: 10; }

        @media print {
            @page { size: landscape; margin: 0; }
            body { background: white; padding: 0; margin: 0; overflow: hidden; }
            .controls, h1, .hint-badge, .slider-v, .slider-h { display: none !important; }
            .container { width: 100%; height: 100vh; display: block; padding: 0; margin: 0; }
            .preview-area { background: none; border: none; display: block; width: 100%; height: 100vh; }
            .canvas-wrapper { background: none; display: flex; justify-content: center; width: 100%; height: 100%; }
            canvas { width: 100%; height: 100%; object-fit: contain; box-shadow: none; border: none; }
        }
    </style>
</head>
<body onload="initApp()">

<div class="container">
    <h1>建具作図ツール V110.0 (プロ仕様決定版)</h1>
    <div class="controls">
        
        <div class="group" style="background: #e8f6f3; border-left-color: #1abc9c;">
            <div class="group-title" style="color: #16a085;">0. プロジェクト管理</div>
            <div class="row-btns" style="margin-bottom: 5px;">
                <button class="btn-main btn-blue" style="padding:8px;" onclick="saveProjectFile()">保存 (ファイル出し)</button>
                <button class="btn-main btn-gray" style="padding:8px;" onclick="document.getElementById('loadFile').click()">開く (読込)</button>
                <input type="file" id="loadFile" style="display:none" accept=".json" onchange="loadProjectFile(this)">
            </div>
            <button class="btn-main btn-dark" style="padding:5px; width:100%; font-size:11px;" onclick="resetToDefault()">新規作成 (リセット)</button>
        </div>

        <div class="group">
            <div class="group-title">1. 図面情報 (表題欄)</div>
            <label>会社名</label><input type="text" id="compName" value="(株) 崎原工房" oninput="drawPreview()">
            <label>工事名</label><input type="text" id="pjName" value="〇〇邸 新築工事" oninput="drawPreview()">
            <label>図面名</label><input type="text" id="dwgName" value="建具姿図・詳細図" oninput="drawPreview()">
            <div style="display:flex; gap:5px;">
                <div style="flex: 1.5;">
                    <label>縮尺</label>
                    <input type="text" id="scaleStr" value="1/20" oninput="drawPreview()">
                    <div class="scale-btn-group">
                        <button class="btn-scale" onclick="setScale('1/10')">1/10</button>
                        <button class="btn-scale" onclick="setScale('1/15')">1/15</button>
                        <button class="btn-scale" onclick="setScale('1/20')">1/20</button>
                        <button class="btn-scale" onclick="setScale('1/30')">1/30</button>
                    </div>
                </div>
                <div><label>日付</label><input type="text" id="dateStr" value="2026/03/11" oninput="drawPreview()"></div>
                <div><label>担当</label><input type="text" id="managerStr" value="設計部" oninput="drawPreview()"></div>
                <div><label>図番</label><input type="text" id="dwgNoStr" value="A-01" oninput="drawPreview()"></div>
            </div>
        </div>

        <div class="group">
            <div class="group-title">2. 基本寸法・配置調整</div>
            <div style="display:flex; gap:5px;">
                <div><label>全幅 (W)</label><input type="number" id="w" value="786" oninput="drawPreview()"></div>
                <div><label>全高 (H)</label><input type="number" id="h" value="2320" oninput="drawPreview()"></div>
            </div>
            <div style="display:flex; gap:5px; margin-top:5px; background: #fff; padding: 5px; border-radius: 4px; border: 1px solid #ffd1a4;">
                <div style="flex:1;"><label>左右(X)</label><input type="number" id="offX" value="0" oninput="syncSlider('X')" step="10"></div>
                <div style="flex:1;"><label>上下(Y)</label><input type="number" id="offY" value="0" oninput="syncSlider('Y')" step="10"></div>
            </div>
            <div style="display:flex; gap:5px; margin-top:5px;">
                <div><label>左框</label><input type="number" id="tsl" value="60" oninput="drawPreview()"></div>
                <div><label>右框</label><input type="number" id="tsr" value="60" oninput="drawPreview()"></div>
            </div>
            <div style="display:flex; gap:5px;">
                <div><label>上山</label><input type="number" id="tt" value="80" oninput="drawPreview()"></div>
                <div><label>下山</label><input type="number" id="tb" value="100" oninput="drawPreview()"></div>
            </div>
            <label>見込み(D)</label><input type="number" id="d" value="30" oninput="drawPreview()">
        </div>

        <div class="group">
            <div class="group-title">3. 中桟・組子詳細</div>
            <div style="display:flex; align-items:center; gap:8px; margin-bottom:5px;">
                <input type="checkbox" id="useMid" onchange="drawPreview()" checked>
                <label style="margin:0;">中桟有効</label>
            </div>
            <div style="display:flex; gap:5px;">
                <div><label>見付(TM)</label><input type="number" id="tm" value="60" oninput="drawPreview()"></div>
                <div><label>中心高</label><input type="number" id="hm" value="505" oninput="drawPreview()"></div>
            </div>
            <div style="display:flex; gap:5px;">
                <div><label>上 立/横</label><input type="number" id="stT" value="5" oninput="drawPreview()"></div>
                <div><label>横数</label><input type="number" id="shT" value="2" oninput="drawPreview()"></div>
            </div>
            <div style="display:flex; gap:5px;">
                <div><label>下 立/横</label><input type="number" id="stB" value="5" oninput="drawPreview()"></div>
                <div><label>横数</label><input type="number" id="shB" value="0" oninput="drawPreview()"></div>
            </div>
            <div style="display:flex; gap:5px;">
                <div><label>立見付</label><input type="number" id="ktv" value="15" oninput="drawPreview()"></div>
                <div><label>横見付</label><input type="number" id="kth" value="15" oninput="drawPreview()"></div>
            </div>
        </div>

        <div class="group">
            <div class="group-title">4. 引き手設定</div>
            <div style="display:flex; align-items:center; gap:8px; margin-bottom:5px;">
                <input type="checkbox" id="showHikite" onchange="drawPreview()" checked>
                <label style="margin:0;">引き手を表示</label>
            </div>
            <div style="display:flex; gap:5px;">
                <div><label>縦/横</label><input type="number" id="hikiH" value="100" oninput="drawPreview()"></div>
                <div><label>横幅</label><input type="number" id="hikiW" value="50" oninput="drawPreview()"></div>
                <div><label>中心高</label><input type="number" id="hikiY" value="900" oninput="drawPreview()"></div>
            </div>
            <div style="display:flex; gap:5px;">
                <div><label>取付側</label>
                    <select id="hikiSide" onchange="drawPreview()">
                        <option value="left">左寄り</option>
                        <option value="right" selected>右寄り</option>
                    </select>
                </div>
                <div><label>チリ</label><input type="number" id="hikiX" value="30" oninput="drawPreview()"></div>
            </div>
        </div>

        <div class="group">
            <div class="group-title">5. 仕上・金物仕様</div>
            <div id="specContainer"></div>
            <button class="btn-add" onclick="addRow()">＋ 行を追加</button>
            <div style="margin-top:10px;">
                <label>特記事項</label>
                <input type="text" id="specNote" value="＊現場寸法確認の上製作" style="color:#c0392b;" oninput="drawPreview()">
            </div>
        </div>

        <div class="group">
            <div class="group-title">6. 自由テキスト配置 (ドラッグ移動)</div>
            <div id="textExtraContainer"></div>
            <button class="btn-add" onclick="addTextRow()">＋ テキスト追加</button>
        </div>

        <div class="action-buttons">
            <button class="btn-main btn-orange" onclick="resetViewAndPrint()">印刷 / PDF保存</button>
            <button class="btn-main btn-dark" onclick="exportDXF()">DXF出力</button>
        </div>
    </div>

    <div class="preview-area">
        <div class="canvas-wrapper">
            <canvas id="previewCanvas" width="1120" height="792"></canvas>
        </div>
        <div class="slider-v">
            <input type="range" id="slideY" min="-1000" max="1000" value="0" step="10" oninput="syncInput('Y')">
        </div>
        <div class="slider-h">
            <input type="range" id="slideX" min="-1000" max="1000" value="0" step="10" oninput="syncInput('X')">
        </div>
        <div class="hint-badge">文字・矢印をドラッグ移動 ｜ 余白ドラッグ：画面移動</div>
    </div>
</div>

<script>
// --- プロジェクト管理エンジン ---
function initApp() {
    ctx = document.getElementById('previewCanvas').getContext('2d');
    const saved = localStorage.getItem('tategu_ultimate_data');
    if (saved) applyProjectData(JSON.parse(saved));
    else resetToDefault();
}

function getProjectData() {
    const v = getValues();
    return {
        inputs: {
            compName: v.compName, pjName: v.pjName, dwgName: v.dwgName, scaleStr: v.scaleStr,
            dateStr: v.dateStr, managerStr: v.managerStr, dwgNoStr: v.dwgNoStr,
            w: v.W, h: v.H, offX: v.offX, offY: v.offY, tsl: v.TSL, tsr: v.TSR, tt: v.TT, tb: v.TB, d: v.D,
            useMid: v.useMid, tm: v.TM, hm: v.HM, stT: v.stT, shT: v.shT, stB: v.stB, shB: v.shB,
            ktv: v.ktv, kth: v.kth, showHikite: v.showHikite, hikiH: v.hikiH, hikiW: v.hikiW,
            hikiY: v.hikiY, hikiSide: v.hikiSide, hikiX: v.hikiX, specNote: v.specNote
        },
        specs: v.specLabels.map((l, i) => ({ label: l, value: v.specValues[i] })),
        extraTexts: v.extraTexts.map(et => ({ text: et.text, x: et.x, y: et.y, useArrow: et.useArrow, ax: et.ax, ay: et.ay }))
    };
}

function applyProjectData(data) {
    if (!data) return;
    for (let key in data.inputs) {
        const el = document.getElementById(key);
        if (el) {
            if (el.type === 'checkbox') el.checked = data.inputs[key];
            else el.value = data.inputs[key];
        }
    }
    document.getElementById('slideX').value = data.inputs.offX;
    document.getElementById('slideY').value = data.inputs.offY;
    document.getElementById('specContainer').innerHTML = "";
    data.specs.forEach(s => addRow(s.label, s.value));
    document.getElementById('textExtraContainer').innerHTML = "";
    data.extraTexts.forEach(et => addTextRow(et.text, et.x, et.y, et.useArrow, et.ax, et.ay));
    drawPreview();
}

function saveProjectFile() {
    const data = getProjectData();
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `建具図_${data.inputs.dwgNoStr}_${data.inputs.pjName}.json`;
    a.click();
}

function loadProjectFile(input) {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => applyProjectData(JSON.parse(e.target.result));
    reader.readAsText(file);
    input.value = "";
}

function resetToDefault() {
    applyProjectData({
        inputs: {
            compName: "(株) 崎原工房", pjName: "〇〇邸 新築工事", dwgName: "建具姿図・詳細図", scaleStr: "1/20",
            dateStr: new Date().toLocaleDateString(), managerStr: "設計部", dwgNoStr: "A-01",
            w: 786, h: 2320, offX: 0, offY: 0, tsl: 60, tsr: 60, tt: 80, tb: 100, d: 30,
            useMid: true, tm: 60, hm: 505, stT: 5, shT: 2, stB: 5, shB: 0,
            ktv: 15, kth: 15, showHikite: true, hikiH: 100, hikiW: 50, hikiY: 900, hikiSide: "right", hikiX: 30, specNote: "＊現場寸法確認の上製作"
        },
        specs: [{ label: "本体", value: "人工タモ塗装品" }, { label: "金物", value: "長角引手" }],
        extraTexts: []
    });
}

// --- 描画エンジン・コア ---
function setScale(val) { document.getElementById('scaleStr').value = val; drawPreview(); }
function syncSlider(axis) { document.getElementById('slide' + axis).value = document.getElementById('off' + axis).value; drawPreview(); }
function syncInput(axis) { document.getElementById('off' + axis).value = document.getElementById('slide' + axis).value; drawPreview(); }

function addRow(l="", v="") {
    const div = document.createElement('div'); div.className = 'spec-row';
    div.innerHTML = `<input type="text" class="spec-label" value="${l}" oninput="drawPreview()"><input type="text" class="spec-value" value="${v}" oninput="drawPreview()"><button class="btn-del" onclick="removeRow(this)">×</button>`;
    document.getElementById('specContainer').appendChild(div);
    drawPreview();
}
function addTextRow(txt="", x=0, y=0, useA=false, ax=100, ay=100) {
    const div = document.createElement('div'); div.className = 'text-row';
    div.innerHTML = `
        <input type="text" class="extra-txt" value="${txt}" placeholder="内容" oninput="drawPreview()">
        <input type="number" class="extra-x" value="${x}" oninput="drawPreview()">
        <input type="number" class="extra-y" value="${y}" oninput="drawPreview()">
        <input type="checkbox" class="extra-use-arrow" ${useA?'checked':''} onchange="drawPreview()">
        <input type="number" class="extra-ax" value="${ax}" oninput="drawPreview()">
        <input type="number" class="extra-ay" value="${ay}" oninput="drawPreview()">
        <button class="btn-del" onclick="removeRow(this)">×</button>`;
    document.getElementById('textExtraContainer').appendChild(div);
    drawPreview();
}
function removeRow(btn) { btn.parentElement.remove(); drawPreview(); }

const getVal = (id, def) => {
    const el = document.getElementById(id);
    if(!el || el.value === "") return def;
    const num = parseFloat(el.value);
    return isNaN(num) ? def : num;
};

function getValues() {
    return {
        compName: document.getElementById('compName').value, pjName: document.getElementById('pjName').value, dwgName: document.getElementById('dwgName').value,
        scaleStr: document.getElementById('scaleStr').value, dateStr: document.getElementById('dateStr').value, managerStr: document.getElementById('managerStr').value, dwgNoStr: document.getElementById('dwgNoStr').value,
        W: getVal('w', 786), H: getVal('h', 2320), D: getVal('d', 30), offX: getVal('offX', 0), offY: getVal('offY', 0),
        TT: getVal('tt', 80), TB: getVal('tb', 100), TSL: getVal('tsl', 60), TSR: getVal('tsr', 60),
        useMid: document.getElementById('useMid').checked, TM: getVal('tm', 60), HM: getVal('hm', 505),
        showHikite: document.getElementById('showHikite').checked, hikiH: getVal('hikiH', 100), hikiW: getVal('hikiW', 50), hikiY: getVal('hikiY', 900), hikiX: getVal('hikiX', 30), hikiSide: document.getElementById('hikiSide').value,
        stT: getVal('stT', 5), shT: getVal('shT', 2), stB: getVal('stB', 5), shB: getVal('shB', 0), ktv: getVal('ktv', 15), kth: getVal('kth', 15),
        specLabels: Array.from(document.querySelectorAll('.spec-label')).map(el => el.value),
        specValues: Array.from(document.querySelectorAll('.spec-value')).map(el => el.value),
        specNote: document.getElementById('specNote').value,
        extraTexts: Array.from(document.querySelectorAll('.text-row')).map(row => ({
            text: row.querySelector('.extra-txt').value,
            x: parseFloat(row.querySelector('.extra-x').value) || 0,
            y: parseFloat(row.querySelector('.extra-y').value) || 0,
            useArrow: row.querySelector('.extra-use-arrow').checked,
            ax: parseFloat(row.querySelector('.extra-ax').value) || 0,
            ay: parseFloat(row.querySelector('.extra-ay').value) || 0,
            elX: row.querySelector('.extra-x'), elY: row.querySelector('.extra-y'),
            elAX: row.querySelector('.extra-ax'), elAY: row.querySelector('.extra-ay')
        }))
    };
}

let ctx = null; let _isDXF = false; let _dxfStr = ""; let _dxfFactor = 1.0; const canvasHeight = 792;
let viewZoom = 1.0; let viewOffsetX = 0; let viewOffsetY = 0;
let lastOriginX = 0, lastOriginY = 0, lastScale = 1;

function outLine(x1, y1, x2, y2, lw=0.6, color="#000") {
    if(!_isDXF) {
        ctx.beginPath(); ctx.strokeStyle = color; ctx.lineWidth = lw;
        ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
    } else {
        let X1 = x1 * _dxfFactor; let Y1 = (canvasHeight - y1) * _dxfFactor;
        let X2 = x2 * _dxfFactor; let Y2 = (canvasHeight - y2) * _dxfFactor;
        _dxfStr += `  0\r\nLINE\r\n  8\r\n0\r\n 10\r\n${X1.toFixed(2)}\r\n 20\r\n${Y1.toFixed(2)}\r\n 11\r\n${X2.toFixed(2)}\r\n 21\r\n${Y2.toFixed(2)}\r\n`;
    }
}
function outRect(x, y, w, h, lw=1.0, color="#000") {
    outLine(x, y, x+w, y, lw, color); outLine(x+w, y, x+w, y+h, lw, color);
    outLine(x+w, y+h, x, y+h, lw, color); outLine(x, y+h, x, y, lw, color);
}
function outText(txt, cx, cy, size, isVert=false, color="#000", align="center") {
    if(!_isDXF) {
        ctx.fillStyle = color; ctx.font = `bold ${size}px sans-serif`; ctx.textAlign = align; ctx.textBaseline = "middle";
        if(isVert) { ctx.save(); ctx.translate(cx, cy); ctx.rotate(-Math.PI/2); ctx.fillText(txt, 0, 0); ctx.restore(); }
        else ctx.fillText(txt, cx, cy);
    } else {
        let DX = cx * _dxfFactor; let DY = (canvasHeight - cy) * _dxfFactor;
        _dxfStr += `  0\r\nTEXT\r\n  8\r\n0\r\n 10\r\n${DX.toFixed(2)}\r\n 20\r\n${DY.toFixed(2)}\r\n 40\r\n${(size*_dxfFactor).toFixed(2)}\r\n  1\r\n${txt}\r\n 50\r\n${isVert?90:0}\r\n`;
    }
}

function drawDim(scale, originX, originY, x1_mm, y1_mm, x2_mm, y2_mm, offset_mm, text, isVert = false) {
    const c_x1 = originX + x1_mm * scale, c_y1 = originY - y1_mm * scale;
    const c_x2 = originX + x2_mm * scale, c_y2 = originY - y2_mm * scale;
    const gap = 6, ext = 5, tick = 3, textOffset = 8; const dir = Math.sign(offset_mm) || 1;
    if(!isVert) {
        const ay = c_y1 - offset_mm * scale; const minX = Math.min(c_x1, c_x2), maxX = Math.max(c_x1, c_x2);
        outLine(c_x1, c_y1 - gap * dir, c_x1, ay - ext * dir, 0.4); outLine(c_x2, c_y2 - gap * dir, c_x2, ay - ext * dir, 0.4);
        outLine(minX, ay, maxX, ay, 0.4); outLine(c_x1 - tick, ay + tick, c_x1 + tick, ay - tick, 0.8); outLine(c_x2 - tick, ay + tick, c_x2 + tick, ay - tick, 0.8);
        outText(text, (minX + maxX) / 2, ay - textOffset * dir, 12, false, "#000", "center");
    } else {
        const ax = c_x1 - offset_mm * scale; const yBot = Math.max(c_y1, c_y2), yTop = Math.min(c_y1, c_y2);
        outLine(c_x1 - gap * dir, c_y1, ax - ext * dir, c_y1, 0.4); outLine(c_x2 - gap * dir, c_y2, ax - ext * dir, c_y2, 0.4);
        outLine(ax, yBot, ax, yTop, 0.4); outLine(ax - tick, c_y1 + tick, ax + tick, c_y1 - tick, 0.8); outLine(ax - tick, c_y2 + tick, ax + tick, c_y2 - tick, 0.8);
        outText(text, ax - textOffset * dir, (yBot + yTop) / 2, 12, true, "#000", "center");
    }
}

function generateDrawing() {
    const canvas = document.getElementById('previewCanvas'); const w = canvas.width, h = canvas.height;
    if(!_isDXF) {
        ctx.save(); ctx.setTransform(1, 0, 0, 1, 0, 0); ctx.clearRect(0, 0, w, h);
        ctx.translate(viewOffsetX, viewOffsetY); ctx.scale(viewZoom, viewZoom);
    }
    const v = getValues();
    if(!_isDXF) localStorage.setItem('tategu_ultimate_data', JSON.stringify(getProjectData()));

    let S_den = 20; let match = v.scaleStr.match(/(\d+)\s*[\/:]\s*(\d+)/); if(match) S_den = parseFloat(match[2]) / parseFloat(match[1]);
    let scale = 1080 / (405 * S_den); _dxfFactor = _isDXF ? 1.0 / scale : 1.0; lastScale = scale;
    const fCX = 350 + (v.offX * scale), fCY = 396 + (v.offY * scale);
    const oX = fCX - ((v.W + 630 + v.D) * scale) / 2, oY = fCY + ((v.H + 1030 + v.D) * scale) / 2 - 20; 
    lastOriginX = oX; lastOriginY = oY;

    const line = (x1, y1, x2, y2, lw=0.6) => { outLine(oX+x1*scale, oY-y1*scale, oX+x2*scale, oY-y2*scale, lw); };

    // --- 図面枠・表題欄 ---
    outRect(20, 20, w - 40, h - 40, 1.0); const ty = h - 65; outLine(20, ty, w - 20, ty, 1.0);
    const cols = [180, 500, 720, 780, 890, 960].map(x => x + 20);
    for(let x of cols) outLine(x, ty, x, h - 20, 1.0);
    const midY = ty + 22.5;
    outText(v.compName, 20+90, midY, 14); outText("工事名：", 200+10, midY, 10, false, "#000", "left"); outText(v.pjName, 200+55, midY, 12, false, "#000", "left");
    outText("図面名：", 520+10, midY, 10, false, "#000", "left"); outText(v.dwgName, 520+55, midY, 12, false, "#000", "left");
    outText("縮尺：", 740+5, midY, 9, false, "#000", "left"); outText(v.scaleStr, 740+35, midY, 11, false, "#000", "left");
    outText("日付：", 800+5, midY, 9, false, "#000", "left"); outText(v.dateStr, 800+35, midY, 11, false, "#000", "left");
    outText("担当：", 910+5, midY, 9, false, "#000", "left"); outText(v.managerStr, 910+35, midY, 11, false, "#000", "left");
    outText("図番：", 980+10, midY, 9, false, "#000", "left"); outText(v.dwgNoStr, 980+50, midY, 12, false, "#000", "left");

    // --- 仕様表 (修正：罫線の復活) ---
    const sX = w - 440, sY = 20, tW = 420, colW = 80, headerH = 28, rowH = 22;
    const specRows = v.specLabels.length;
    const totalSpecH = headerH + (specRows * rowH) + 28;
    outRect(sX, sY, tW, totalSpecH, 0.5); // 外枠
    outLine(sX, sY + headerH, sX + tW, sY + headerH, 0.5); // ヘッダー区切り横線
    outLine(sX + colW, sY, sX + colW, sY + headerH + (specRows * rowH), 0.5); // 名称と仕上の仕切り縦線
    for(let i=1; i<=specRows; i++) {
        outLine(sX, sY + headerH + i*rowH, sX + tW, sY + headerH + i*rowH, 0.5); // 行ごとの横線
    }
    outText("名称", sX + colW/2, sY + headerH/2, 13);
    outText("仕上 ・ 金物", sX + colW + (tW-colW)/2, sY + headerH/2, 13);
    v.specLabels.forEach((l, i) => {
        outText(l, sX + colW/2, sY + headerH + i*rowH + rowH/2, 12);
        outText(v.specValues[i], sX + colW + 10, sY + headerH + i*rowH + rowH/2, 12, false, "#000", "left");
    });
    outText(v.specNote, sX + 10, sY + headerH + specRows*rowH + 14, 12, false, "#c0392b", "left");

    // --- 姿図 ---
    line(0,0,v.W,0,1); line(0,v.H,v.W,v.H,1); line(0,0,0,v.H,1); line(v.W,0,v.W,v.H,1);
    line(v.TSL,0,v.TSL,v.H,0.6); line(v.W-v.TSR,0,v.W-v.TSR,v.H,0.6);
    line(v.TSL,v.TB,v.W-v.TSR,v.TB,0.6); line(v.TSL,v.H-v.TT,v.W-v.TSR,v.H-v.TT,0.6);
    if(v.useMid){ line(v.TSL, v.HM-v.TM/2, v.W-v.TSR, v.HM-v.TM/2, 0.6); line(v.TSL, v.HM+v.TM/2, v.W-v.TSR, v.HM+v.TM/2, 0.6); }

    const drawK = (yL, yH, nV, nH, ktv, kth) => {
        if(yH <= yL) return; const xG = (v.W - v.TSL - v.TSR) / (nV + 1); let kX = [];
        for(let i=1; i<=nV; i++){ let cx = v.TSL + xG*i; kX.push(cx); line(cx-ktv/2, yL, cx-ktv/2, yH, 0.6); line(cx+ktv/2, yL, cx+ktv/2, yH, 0.6); }
        if(nH > 0) { const yG = (yH - yL) / (nH + 1); for(let j=1; j<=nH; j++){ let y = yL+yG*j; line(v.TSL, y-kth/2, v.W-v.TSR, y-kth/2, 0.3); line(v.TSL, y+kth/2, v.W-v.TSR, y+kth/2, 0.3); } }
    };
    if(v.useMid){ drawK(v.HM+v.TM/2, v.H-v.TT, v.stT, v.shT, v.ktv, v.kth); drawK(v.TB, v.HM-v.TM/2, v.stB, v.shB, v.ktv, v.kth); }
    else drawK(v.TB, v.H-v.TT, v.stT, v.shT, v.ktv, v.kth);

    if(v.showHikite){
        let hx = (v.hikiSide === "left") ? v.hikiX : v.W - v.hikiX - v.hikiW;
        outRect(oX + hx*scale, oY - (v.hikiY + v.hikiH/2)*scale, v.hikiW*scale, v.hikiH*scale, 1.0, "#c0392b");
    }

    // --- 寸法線 ---
    const offL = 200;
    if(v.useMid) {
        drawDim(scale, oX, oY, 0, v.HM-v.TM/2, 0, v.TB, offL, Math.round(v.HM-v.TM/2-v.TB), true);
        drawDim(scale, oX, oY, 0, v.HM+v.TM/2, 0, v.HM-v.TM/2, offL, Math.round(v.TM), true);
        drawDim(scale, oX, oY, 0, v.H-v.TT, 0, v.HM+v.TM/2, offL, Math.round(v.H-v.TT-(v.HM+v.TM/2)), true);
    } else drawDim(scale, oX, oY, 0, v.H-v.TT, 0, v.TB, offL, Math.round(v.H-v.TB-v.TT), true);
    drawDim(scale, oX, oY, 0, v.H, 0, v.H-v.TT, offL, Math.round(v.TT), true);
    drawDim(scale, oX, oY, 0, v.TB, 0, 0, offL, Math.round(v.TB), true);
    drawDim(scale, oX, oY, 0, v.H, 0, 0, 400, Math.round(v.H), true); 
    drawDim(scale, oX, oY, 0, v.H, v.W, v.H, 400, v.W);

    // --- 平面図・断面図 ---
    const py = v.H + 1000; line(0, py, v.W, py); line(0, py+v.D, v.W, py+v.D); line(0, py, 0, py+v.D); line(v.W, py, v.W, py+v.D);
    line(v.TSL, py, v.TSL, py+v.D); line(v.W-v.TSR, py, v.W-v.TSR, py+v.D);
    drawDim(scale, oX, oY, 0, py+v.D, 0, py, -150, Math.round(v.D), true);
    const sx = v.W + 600; line(sx, 0, sx+v.D, 0); line(sx, v.H, sx+v.D, v.H); line(sx, 0, sx, v.H); line(sx+v.D, 0, sx+v.D, v.H);
    drawDim(scale, oX, oY, sx, 0, sx+v.D, 0, -100, Math.round(v.D));

    // --- テキスト & 矢印 ---
    v.extraTexts.forEach(et => {
        if(et.text.trim() === "") return;
        const tx = oX + et.x*scale, ty = oY - et.y*scale;
        outText(et.text, tx, ty, 12, false, "#000", "left");
        if(et.useArrow) {
            const ax = oX + et.ax*scale, ay = oY - et.ay*scale;
            outLine(tx, ty, ax, ay, 0.4);
            const headLen = 10*scale, angle = Math.atan2(ay-ty, ax-tx);
            outLine(ax, ay, ax - headLen*Math.cos(angle-Math.PI/6), ay - headLen*Math.sin(angle-Math.PI/6), 0.6);
            outLine(ax, ay, ax - headLen*Math.cos(angle+Math.PI/6), ay - headLen*Math.sin(angle+Math.PI/6), 0.6);
        }
    });
    if(!_isDXF) ctx.restore();
}

function drawPreview() { _isDXF = false; generateDrawing(); }
function resetViewAndPrint() { viewZoom = 1.0; viewOffsetX = 0; viewOffsetY = 0; drawPreview(); setTimeout(() => window.print(), 200); }
function exportDXF() { _isDXF = true; _dxfStr = "  0\r\nSECTION\r\n  2\r\nENTITIES\r\n"; generateDrawing(); _dxfStr += "  0\r\nENDSEC\r\n  0\r\nEOF\r\n"; _isDXF = false; const blob = new Blob([_dxfStr], { type: 'text/plain;charset=utf-8' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `建具図.dxf`; a.click(); }

// --- イベント制御 ---
document.addEventListener("DOMContentLoaded", () => {
    const canvas = document.getElementById('previewCanvas');
    let isDragging = false, dragStartX = 0, dragStartY = 0;
    let dragTargetText = null; let dragTargetArrow = null;

    canvas.addEventListener('mousedown', (e) => {
        const rect = canvas.getBoundingClientRect();
        const mx = (e.clientX - rect.left - viewOffsetX) / viewZoom;
        const my = (e.clientY - rect.top - viewOffsetY) / viewZoom;
        const v = getValues();
        dragTargetText = null; dragTargetArrow = null;
        for(let et of v.extraTexts) {
            if(et.useArrow) {
                const ax = lastOriginX + et.ax * lastScale, ay = lastOriginY - et.ay * lastScale;
                if(Math.hypot(mx - ax, my - ay) < 15) { dragTargetArrow = et; break; }
            }
            const tx = lastOriginX + et.x * lastScale, ty = lastOriginY - et.y * lastScale;
            if(mx >= tx && mx <= tx + et.text.length*12 && my >= ty-15 && my <= ty+15) { dragTargetText = et; break; }
        }
        isDragging = true; dragStartX = e.clientX; dragStartY = e.clientY;
    });

    canvas.addEventListener('mousemove', (e) => {
        if(!isDragging) return;
        const dx = (e.clientX - dragStartX) / viewZoom / lastScale, dy = (e.clientY - dragStartY) / viewZoom / lastScale;
        if(dragTargetArrow) {
            dragTargetArrow.ax += dx; dragTargetArrow.ay -= dy;
            dragTargetArrow.elAX.value = Math.round(dragTargetArrow.ax); dragTargetArrow.elAY.value = Math.round(dragTargetArrow.ay);
            drawPreview();
        } else if(dragTargetText) {
            dragTargetText.x += dx; dragTargetText.y -= dy;
            dragTargetText.elX.value = Math.round(dragTargetText.x); dragTargetText.elY.value = Math.round(dragTargetText.y);
            drawPreview();
        } else {
            viewOffsetX += e.clientX - dragStartX; viewOffsetY += e.clientY - dragStartY;
            drawPreview();
        }
        dragStartX = e.clientX; dragStartY = e.clientY;
    });

    window.addEventListener('mouseup', () => { isDragging = false; dragTargetText = null; dragTargetArrow = null; });
    canvas.addEventListener('wheel', (e) => {
        e.preventDefault(); const rect = canvas.getBoundingClientRect();
        const mouseX = e.clientX - rect.left, mouseY = e.clientY - rect.top;
        const zoomFactor = e.deltaY < 0 ? 1.1 : 0.9;
        const worldX = (mouseX - viewOffsetX) / viewZoom, worldY = (mouseY - viewOffsetY) / viewZoom;
        viewZoom = Math.max(0.1, Math.min(viewZoom * zoomFactor, 10)); 
        viewOffsetX = mouseX - worldX * viewZoom; viewOffsetY = mouseY - worldY * viewZoom; drawPreview();
    }, { passive: false });
    canvas.addEventListener('dblclick', () => { viewZoom=1; viewOffsetX=0; viewOffsetY=0; drawPreview(); });
});
</script>
