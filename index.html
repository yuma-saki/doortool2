<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>建具作図ツール V111.23 - 無限Undo完全対応版</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #eef2f3; padding: 20px; display: flex; flex-direction: column; align-items: center; margin: 0; }
        .container { width: 1650px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); display: grid; grid-template-columns: 420px 1fr; gap: 20px; }
        h1 { grid-column: 1 / -1; font-size: 18px; text-align: center; color: #2c3e50; border-bottom: 3px solid #e67e22; padding-bottom: 10px; margin-top:0; }
        .controls { display: flex; flex-direction: column; gap: 6px; max-height: 92vh; overflow-y: auto; padding-right: 15px; }
        .group { background: #fff5eb; padding: 10px; border-radius: 8px; border-left: 5px solid #e67e22; margin-bottom: 4px; }
        .group-title { font-size: 11px; color: #d35400; margin-bottom: 6px; text-transform: uppercase; font-weight: bold; border-bottom: 1px solid #ffdec0; }
        label { font-size: 11px; font-weight: bold; color: #333; display: block; margin-top: 4px; }
        input, select { width: 100%; padding: 5px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 13px; }
        
        .scale-btn-group { display: flex; gap: 2px; margin-top: 4px; }
        .btn-scale { flex: 1; padding: 3px 0; font-size: 10px; background: #fff; border: 1px solid #e67e22; color: #e67e22; border-radius: 4px; cursor: pointer; transition: 0.2s; }
        .btn-scale:hover { background: #e67e22; color: #fff; }

        .spec-row { display: grid; grid-template-columns: 80px 1fr 30px; gap: 5px; margin-bottom: 4px; }
        .text-row { display: grid; grid-template-columns: 1fr 42px 42px 35px 25px 42px 42px 25px; gap: 3px; margin-bottom: 4px; align-items: center; }
        .op-row { display: grid; grid-template-columns: 80px 42px 42px 42px 42px 42px 25px; gap: 3px; margin-bottom: 4px; align-items: center; }

        .btn-add { background: #27ae60; padding: 6px; font-size: 11px; margin-top: 5px; border: none; border-radius: 4px; color: white; cursor: pointer; width: 120px; }
        .btn-del { background: #e74c3c; padding: 2px 5px; font-size: 10px; border: none; border-radius: 4px; color: white; height: 24px; cursor: pointer; }
        
        .action-buttons { display: flex; flex-direction: column; gap: 5px; margin-top: 10px; }
        .row-btns { display: flex; gap: 5px; }
        .btn-main { flex: 1; padding: 12px; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; font-weight: bold; color: white; box-shadow: 0 4px 0 rgba(0,0,0,0.2); }
        .btn-orange { background: #e67e22; }
        .btn-blue { background: #3498db; }
        .btn-dark { background: #34495e; }
        .btn-gray { background: #95a5a6; }

        .preview-area { background: #dcdde1; display: grid; grid-template-columns: 1fr 40px; grid-template-rows: 1fr 40px; border: 2px solid #7f8fa6; position: relative; overflow: hidden; }
        .canvas-wrapper { grid-column: 1; grid-row: 1; display: flex; justify-content: center; align-items: center; overflow: hidden; background: #555; }
        canvas { background: white; box-shadow: 0 5px 15px rgba(0,0,0,0.2); cursor: grab; }
        
        .slider-v { grid-column: 2; grid-row: 1; display: flex; justify-content: center; padding: 20px 0; background: #f1f2f6; border-left: 1px solid #ccc; }
        .slider-h { grid-column: 1; grid-row: 2; display: flex; align-items: center; padding: 0 20px; background: #f1f2f6; border-top: 1px solid #ccc; }
        input[type=range] { cursor: pointer; }
        .slider-v input { writing-mode: bt-lr; appearance: slider-vertical; width: 8px; height: 100%; }
        .slider-h input { width: 100%; height: 8px; }

        .hint-badge { position: absolute; bottom: 50px; right: 50px; background: rgba(230, 126, 34, 0.9); color: white; padding: 8px 12px; border-radius: 6px; font-size: 12px; font-weight: bold; pointer-events: none; z-index: 10; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }

        /* 印刷余白を極限まで小さく */
        @media print {
            @page { size: A4 landscape; margin: 0; }
            body, html { width: 100%; height: 100%; background: white; padding: 0; margin: 0; overflow: hidden; }
            .controls, h1, .hint-badge, .slider-v, .slider-h { display: none !important; }
            .container { width: 100%; height: 100%; display: block; padding: 0; margin: 0; border-radius: 0; box-shadow: none; border: none; }
            .preview-area { background: none; border: none; display: block; width: 100%; height: 100%; padding: 0; margin: 0; }
            .canvas-wrapper { background: none; display: flex; justify-content: center; align-items: center; width: 100%; height: 100%; }
            canvas { max-width: 100%; max-height: 100%; object-fit: contain; box-shadow: none; border: none; }
        }
    </style>
</head>
<body onload="initApp()">

<div class="container">
    <h1>建具作図ツール V111.23 (無限Undo完全対応版)</h1>
    <div class="controls">
        
        <div class="group" style="background: #e8f6f3; border-left-color: #1abc9c;">
            <div class="group-title" style="color: #16a085;">0. プロジェクト管理</div>
            <div class="row-btns" style="margin-bottom: 5px;">
                <button class="btn-main btn-blue" style="padding:8px;" onclick="saveProjectFile()">保存 (ファイル出し)</button>
                <button class="btn-main btn-gray" style="padding:8px;" onclick="document.getElementById('loadFile').click()">開く (読込)</button>
                <input type="file" id="loadFile" style="display:none" accept=".json" onchange="loadProjectFile(this)">
            </div>
            <button class="btn-main btn-dark" style="padding:5px; width:100%; font-size:11px;" onclick="resetToDefault()">新規作成 (リセット)</button>
        </div>

        <div class="group">
            <div class="group-title">1. 図面情報 (表題欄)</div>
            <label>会社名</label><input type="text" id="compName" value="(株) 崎原工房" oninput="drawPreview()">
            <label>工事名</label><input type="text" id="pjName" value="〇〇邸 新築工事" oninput="drawPreview()">
            <label>図面名</label><input type="text" id="dwgName" value="建具姿図・詳細図" oninput="drawPreview()">
            <div style="display:flex; gap:5px;">
                <div style="flex: 1.5;">
                    <label>縮尺</label>
                    <input type="text" id="scaleStr" value="1/20" oninput="drawPreview()">
                    <div class="scale-btn-group">
                        <button class="btn-scale" onclick="setScale('1/10')">1/10</button>
                        <button class="btn-scale" onclick="setScale('1/15')">1/15</button>
                        <button class="btn-scale" onclick="setScale('1/20')">1/20</button>
                        <button class="btn-scale" onclick="setScale('1/30')">1/30</button>
                    </div>
                </div>
                <div><label>日付</label><input type="text" id="dateStr" value="2026/03/12" oninput="drawPreview()"></div>
                <div><label>担当</label><input type="text" id="managerStr" value="設計部" oninput="drawPreview()"></div>
                <div><label>図番</label><input type="text" id="dwgNoStr" value="A-01" oninput="drawPreview()"></div>
            </div>
        </div>

        <div class="group">
            <div class="group-title">2. 基本寸法・配置調整</div>
            <div style="display:flex; gap:5px;">
                <div><label>全幅 (W)</label><input type="number" id="w" value="786" oninput="drawPreview()"></div>
                <div><label>全高 (H)</label><input type="number" id="h" value="2320" oninput="drawPreview()"></div>
            </div>
            <div style="display:flex; gap:5px; margin-top:5px; background: #fff; padding: 5px; border-radius: 4px; border: 1px solid #ffd1a4;">
                <div style="flex:1;"><label>左右(X)</label><input type="number" id="offX" value="0" oninput="syncSlider('X')" step="10"></div>
                <div style="flex:1;"><label>上下(Y)</label><input type="number" id="offY" value="0" oninput="syncSlider('Y')" step="10"></div>
            </div>
            <div style="display:flex; gap:5px; margin-top:5px;">
                <div><label>左框</label><input type="number" id="tsl" value="60" oninput="drawPreview()"></div>
                <div><label>右框</label><input type="number" id="tsr" value="60" oninput="drawPreview()"></div>
            </div>
            <div style="display:flex; gap:5px;">
                <div><label>上山</label><input type="number" id="tt" value="80" oninput="drawPreview()"></div>
                <div><label>下山</label><input type="number" id="tb" value="100" oninput="drawPreview()"></div>
            </div>
            <label>見込み(D)</label><input type="number" id="d" value="30" oninput="drawPreview()">
        </div>

        <div class="group">
            <div class="group-title">3. 中桟・組子詳細</div>
            <div style="display:flex; align-items:center; gap:8px; margin-bottom:5px;">
                <input type="checkbox" id="useMid" onchange="drawPreview()" checked>
                <label style="margin:0;">中桟有効</label>
            </div>
            <div style="display:flex; gap:5px;">
                <div><label>見付(TM)</label><input type="number" id="tm" value="60" oninput="drawPreview()"></div>
                <div><label>中心高</label><input type="number" id="hm" value="505" oninput="drawPreview()"></div>
            </div>
            <div style="display:flex; gap:5px;">
                <div><label>上 立/横</label><input type="number" id="stT" value="5" oninput="drawPreview()"></div>
                <div><label>横数</label><input type="number" id="shT" value="2" oninput="drawPreview()"></div>
            </div>
            <div style="display:flex; gap:5px;">
                <div><label>下 立/横</label><input type="number" id="stB" value="5" oninput="drawPreview()"></div>
                <div><label>横数</label><input type="number" id="shB" value="0" oninput="drawPreview()"></div>
            </div>
            <div style="display:flex; gap:5px;">
                <div><label>立見付</label><input type="number" id="ktv" value="15" oninput="drawPreview()"></div>
                <div><label>横見付</label><input type="number" id="kth" value="15" oninput="drawPreview()"></div>
            </div>
        </div>

        <div class="group">
            <div class="group-title">4. 引き手設定</div>
            <div style="display:flex; align-items:center; gap:8px; margin-bottom:5px;">
                <input type="checkbox" id="showHikite" onchange="drawPreview()" checked>
                <label style="margin:0;">引き手を表示</label>
            </div>
            <div style="display:flex; gap:5px;">
                <div><label>縦/横</label><input type="number" id="hikiH" value="100" oninput="drawPreview()"></div>
                <div><label>横幅</label><input type="number" id="hikiW" value="50" oninput="drawPreview()"></div>
                <div><label>中心高</label><input type="number" id="hikiY" value="900" oninput="drawPreview()"></div>
            </div>
            <div style="display:flex; gap:5px;">
                <div><label>取付側</label>
                    <select id="hikiSide" onchange="drawPreview()">
                        <option value="left">左寄り</option>
                        <option value="right" selected>右寄り</option>
                    </select>
                </div>
                <div><label>チリ</label><input type="number" id="hikiX" value="30" oninput="drawPreview()"></div>
            </div>
        </div>

        <div class="group">
            <div class="group-title">5. 仕上・金物仕様</div>
            <div id="specContainer"></div>
            <button class="btn-add" onclick="addRow()">＋ 行を追加</button>
            <div style="margin-top:10px;">
                <label>特記事項</label>
                <input type="text" id="specNote" value="＊現場寸法確認の上製作" style="color:#c0392b;" oninput="drawPreview()">
            </div>
        </div>

        <div class="group">
            <div class="group-title">6. 明かり取り・ガラリ</div>
            <div style="font-size:10px; color:#555; margin-bottom:5px;">X, Y, W(幅), H(高), M(見付)</div>
            <div id="openingContainer"></div>
            <button class="btn-add" onclick="addOpeningRow()">＋ 開口部追加</button>
        </div>

        <div class="group">
            <div class="group-title">7. 自由テキスト配置</div>
            <div style="font-size:10px; color:#555; margin-bottom:5px;">内容, X, Y, 角度, 矢, 矢X, 矢Y</div>
            <div id="textExtraContainer"></div>
            <button class="btn-add" onclick="addTextRow()">＋ テキスト追加</button>
        </div>

        <div class="group" style="background: #f8d7da; border-left-color: #e74c3c;">
            <div class="group-title" style="color: #c0392b;">8. 独立消しゴム＆編集ツール</div>
            <div class="row-btns">
                <button id="eraserBtn" class="btn-main btn-gray" style="background:#95a5a6; padding:10px; font-size:12px;" onclick="toggleEraser()">🧹 消しゴム：OFF</button>
                <button class="btn-main" style="background:#bdc3c7; color:#333; padding:10px; font-size:12px;" onclick="undoEraser()">↩ 1つ戻す (無限Undo)</button>
            </div>
            <div style="font-size:10px; color:#c0392b; margin-top:5px; line-height:1.3;">ONの状態でキャンバス上の「文字」「数字」「線」をクリックすると独立して消せます。</div>
        </div>

        <div class="action-buttons">
            <button class="btn-main btn-orange" onclick="resetViewAndPrint()">印刷 / PDF保存</button>
            <button class="btn-main btn-dark" onclick="exportDXF()">DXF出力</button>
        </div>
    </div>

    <div class="preview-area">
        <div class="canvas-wrapper">
            <canvas id="previewCanvas" width="1120" height="792"></canvas>
        </div>
        <div class="slider-v">
            <input type="range" id="slideY" min="-1000" max="1000" value="0" step="10" oninput="syncInput('Y')">
        </div>
        <div class="slider-h">
            <input type="range" id="slideX" min="-1000" max="1000" value="0" step="10" oninput="syncInput('X')">
        </div>
        <div class="hint-badge" id="hintBadge">💡 ドラッグ移動＆独立消しゴム＆文字回転 搭載！</div>
    </div>
</div>

<script>
// --- グローバル変数 ---
window.customDimOffsets = window.customDimOffsets || {};
window.hiddenDimTexts = window.hiddenDimTexts || [];
window.hiddenDimLines = window.hiddenDimLines || [];
window.eraserHistory = window.eraserHistory || []; // Undo履歴用スタック
window.clickableDims = []; 
let isEraserMode = false;

// --- テキスト回転ボタン処理 ---
function rotateText(btn) {
    let angle = parseInt(btn.dataset.angle) || 0;
    angle = (angle + 90) % 360; 
    btn.dataset.angle = angle;
    btn.innerText = angle + '°';
    drawPreview();
}

// --- 消しゴム機能の制御 ---
function toggleEraser() {
    isEraserMode = !isEraserMode;
    const btn = document.getElementById('eraserBtn');
    const badge = document.getElementById('hintBadge');
    if (isEraserMode) {
        btn.innerText = "🧹 消しゴム：ON (個別消去)";
        btn.style.background = "#e74c3c";
        btn.style.color = "white";
        document.getElementById('previewCanvas').style.cursor = "crosshair";
        badge.innerText = "⚠️ 消しゴムON：文字・数字・線を個別に消せます";
        badge.style.background = "rgba(231, 76, 60, 0.9)";
    } else {
        btn.innerText = "🧹 消しゴム：OFF";
        btn.style.background = "#95a5a6";
        btn.style.color = "white";
        document.getElementById('previewCanvas').style.cursor = "grab";
        badge.innerText = "💡 ドラッグ移動＆独立消しゴム＆文字回転 搭載！";
        badge.style.background = "rgba(230, 126, 34, 0.9)";
    }
}

// --- 無限Undo機能 (エラー回避強化版) ---
function undoEraser() {
    if (!window.eraserHistory || window.eraserHistory.length === 0) return;
    const last = window.eraserHistory.pop(); 
    
    if (last.type === 'dimText') {
        window.hiddenDimTexts = window.hiddenDimTexts.filter(id => id !== last.id);
    } else if (last.type === 'dimLine') {
        window.hiddenDimLines = window.hiddenDimLines.filter(id => id !== last.id);
    } else if (last.type === 'domNode') {
        try {
            // エラー回避：隣にあった要素がまだ親要素内に存在するかチェック
            if (last.nextSibling && last.nextSibling.parentNode === last.parent) {
                last.parent.insertBefore(last.el, last.nextSibling);
            } else {
                last.parent.appendChild(last.el); // 存在しない場合は一番下に追加して確実に復元
            }
        } catch(e) {
            last.parent.appendChild(last.el); // 万が一エラーが起きても確実に末尾に復元
        }
    }
    drawPreview();
}

// --- プロジェクト管理 ---
const STORAGE_KEY = 'tategu_final_perfect_data';

function initApp() {
    ctx = document.getElementById('previewCanvas').getContext('2d');
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
        try { applyProjectData(JSON.parse(saved)); } catch(e) { resetToDefault(); }
    } else {
        resetToDefault();
    }
}

function getProjectData() {
    const v = getValues();
    return {
        inputs: {
            compName: v.compName, pjName: v.pjName, dwgName: v.dwgName, scaleStr: v.scaleStr,
            dateStr: v.dateStr, managerStr: v.managerStr, dwgNoStr: v.dwgNoStr,
            w: v.W, h: v.H, offX: v.offX, offY: v.offY, tsl: v.TSL, tsr: v.TSR, tt: v.TT, tb: v.TB, d: v.D,
            useMid: v.useMid, tm: v.TM, hm: v.HM, stT: v.stT, shT: v.shT, stB: v.stB, shB: v.shB,
            ktv: v.ktv, kth: v.kth, showHikite: v.showHikite, hikiH: v.hikiH, hikiW: v.hikiW,
            hikiY: v.hikiY, hikiSide: v.hikiSide, hikiX: v.hikiX, specNote: v.specNote
        },
        specs: v.specLabels.map((l, i) => ({ label: l, value: v.specValues[i] })),
        extraTexts: v.extraTexts.map(et => ({ text: et.text, x: et.x, y: et.y, angle: et.angle, useArrow: et.useArrow, ax: et.ax, ay: et.ay })),
        openings: v.openings.map(op => ({ type: op.type, x: op.x, y: op.y, w: op.w, h: op.h, m: op.m })),
        customDimOffsets: window.customDimOffsets,
        hiddenDimTexts: window.hiddenDimTexts,
        hiddenDimLines: window.hiddenDimLines
    };
}

function applyProjectData(data) {
    if (!data) return;
    for (let key in data.inputs) {
        const el = document.getElementById(key);
        if (el) {
            if (el.type === 'checkbox') el.checked = data.inputs[key];
            else el.value = data.inputs[key];
        }
    }
    document.getElementById('slideX').value = data.inputs.offX;
    document.getElementById('slideY').value = data.inputs.offY;
    document.getElementById('specContainer').innerHTML = "";
    if(data.specs) data.specs.forEach(s => addRow(s.label, s.value));
    
    document.getElementById('textExtraContainer').innerHTML = "";
    if(data.extraTexts) {
        data.extraTexts.forEach(et => {
            let ang = et.angle !== undefined ? et.angle : (et.isVert ? 90 : 0);
            addTextRow(et.text, et.x, et.y, ang, et.useArrow, et.ax, et.ay);
        });
    }
    document.getElementById('openingContainer').innerHTML = "";
    if(data.openings) data.openings.forEach(op => addOpeningRow(op.type, op.x, op.y, op.w, op.h, op.m));
    
    window.customDimOffsets = data.customDimOffsets || {}; 
    window.hiddenDimTexts = data.hiddenDimTexts || data.hiddenDims || []; 
    window.hiddenDimLines = data.hiddenDimLines || data.hiddenDims || []; 
    window.eraserHistory = []; 
    drawPreview();
}

function saveProjectFile() {
    const data = getProjectData();
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `建具図_${data.inputs.dwgNoStr}_${data.inputs.pjName}.json`;
    a.click();
}

function loadProjectFile(input) {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => applyProjectData(JSON.parse(e.target.result));
    reader.readAsText(file);
    input.value = "";
}

function resetToDefault() {
    window.customDimOffsets = {}; 
    window.hiddenDimTexts = [];
    window.hiddenDimLines = [];
    window.eraserHistory = [];
    applyProjectData({
        inputs: {
            compName: "(株) 崎原工房", pjName: "〇〇邸 新築工事", dwgName: "建具姿図・詳細図", scaleStr: "1/20",
            dateStr: new Date().toLocaleDateString(), managerStr: "設計部", dwgNoStr: "A-01",
            w: 786, h: 2320, offX: 0, offY: 0, tsl: 60, tsr: 60, tt: 80, tb: 100, d: 30,
            useMid: true, tm: 60, hm: 505, stT: 5, shT: 2, stB: 5, shB: 0,
            ktv: 15, kth: 15, showHikite: true, hikiH: 100, hikiW: 50, hikiY: 900, hikiSide: "right", hikiX: 30, specNote: "＊現場寸法確認の上製作"
        },
        specs: [{ label: "本体", value: "人工タモ塗装品" }, { label: "金物", value: "長角引手" }],
        extraTexts: [],
        openings: [],
        customDimOffsets: {}
    });
}

// --- UI操作 ---
function setScale(val) { document.getElementById('scaleStr').value = val; drawPreview(); }
function syncSlider(axis) { document.getElementById('slide' + axis).value = document.getElementById('off' + axis).value; drawPreview(); }
function syncInput(axis) { document.getElementById('off' + axis).value = document.getElementById('slide' + axis).value; drawPreview(); }

function addRow(l="", v="") {
    const div = document.createElement('div'); div.className = 'spec-row';
    div.innerHTML = `<input type="text" class="spec-label" value="${l}" oninput="drawPreview()"><input type="text" class="spec-value" value="${v}" oninput="drawPreview()"><button class="btn-del" onclick="removeRow(this)">×</button>`;
    document.getElementById('specContainer').appendChild(div);
    drawPreview();
}

function addTextRow(txt="", x=0, y=0, angle=0, useA=false, ax=100, ay=100) {
    if (angle === true) angle = 90; 
    if (angle === false) angle = 0;
    
    const div = document.createElement('div'); div.className = 'text-row';
    div.innerHTML = `
        <input type="text" class="extra-txt" value="${txt}" placeholder="内容" oninput="drawPreview()">
        <input type="number" class="extra-x" value="${x}" title="X座標" placeholder="X" oninput="drawPreview()">
        <input type="number" class="extra-y" value="${y}" title="Y座標" placeholder="Y" oninput="drawPreview()">

let ctx = null; let _isDXF = false; let _dxfStr = ""; let _dxfFactor = 1.0; const canvasHeight = 792;
let viewZoom = 1.0; let viewOffsetX = 0; let viewOffsetY = 0;
let lastOriginX = 0, lastOriginY = 0, lastScale = 1;

function outLine(x1, y1, x2, y2, lw=0.6, color="#000") {
    if(!_isDXF) {
        ctx.beginPath(); ctx.strokeStyle = color; ctx.lineWidth = lw; ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
    } else {
        _dxfStr += `  0\r\nLINE\r\n  8\r\n0\r\n 10\r\n${(x1*_dxfFactor).toFixed(2)}\r\n 20\r\n${((canvasHeight-y1)*_dxfFactor).toFixed(2)}\r\n 11\r\n${(x2*_dxfFactor).toFixed(2)}\r\n 21\r\n${((canvasHeight-y2)*_dxfFactor).toFixed(2)}\r\n`;
    }
}
function outRect(x, y, w, h, lw=1.0, color="#000") {
    outLine(x, y, x+w, y, lw, color); outLine(x+w, y, x+w, y+h, lw, color); outLine(x+w, y+h, x, y+h, lw, color); outLine(x, y+h, x, y, lw, color);
}
function outCircle(cx, cy, r, lw=1.0, color="#000", isFill=false) {
    if(!_isDXF) {
        ctx.beginPath(); ctx.strokeStyle = color; ctx.lineWidth = lw; ctx.arc(cx, cy, r, 0, Math.PI * 2); 
        if(isFill) { ctx.fillStyle = color; ctx.fill(); } else { ctx.stroke(); }
    } else {
        _dxfStr += `  0\r\nCIRCLE\r\n  8\r\n0\r\n 10\r\n${(cx*_dxfFactor).toFixed(2)}\r\n 20\r\n${((canvasHeight-cy)*_dxfFactor).toFixed(2)}\r\n 40\r\n${(r*_dxfFactor).toFixed(2)}\r\n`;
    }
}
function outText(txt, cx, cy, size, angle=0, color="#000", align="center") {
    let rot = (typeof angle === 'boolean') ? (angle ? 90 : 0) : angle;
    
    if(!_isDXF) {
        ctx.fillStyle = color; ctx.font = `bold ${size}px sans-serif`; ctx.textAlign = align; ctx.textBaseline = "middle";
        if(rot !== 0) { ctx.save(); ctx.translate(cx, cy); ctx.rotate(rot * Math.PI / 180); ctx.fillText(txt, 0, 0); ctx.restore(); }
        else ctx.fillText(txt, cx, cy);
    } else {
        const dxfX = (cx * _dxfFactor).toFixed(2);
        const dxfY = ((canvasHeight - cy) * _dxfFactor).toFixed(2);
        const dxfS = (size * _dxfFactor).toFixed(2);
        let alignCode = (align === "left") ? 0 : (align === "right" ? 2 : 1);
        let dxfRot = (360 - rot) % 360; 
        _dxfStr += `  0\r\nTEXT\r\n  8\r\n0\r\n 10\r\n${dxfX}\r\n 20\r\n${dxfY}\r\n 40\r\n${dxfS}\r\n  1\r\n${txt}\r\n 50\r\n${dxfRot}\r\n 72\r\n${alignCode}\r\n 11\r\n${dxfX}\r\n 21\r\n${dxfY}\r\n 73\r\n2\r\n`;
    }
}

// 共通：丸天寸法線描画 (独立消しゴム対応)
function drawDim(scale, originX, originY, x1_mm, y1_mm, x2_mm, y2_mm, offset_mm, text, isVert = false, dimId = null) {
    const hideText = dimId && window.hiddenDimTexts && window.hiddenDimTexts.includes(dimId);
    const hideLine = dimId && window.hiddenDimLines && window.hiddenDimLines.includes(dimId);
    
    if (hideText && hideLine) return; 

    let custDx = 0, custDy = 0;
    if (dimId && window.customDimOffsets[dimId]) {
        custDx = window.customDimOffsets[dimId].x;
        custDy = window.customDimOffsets[dimId].y;
    }

    const orig_x1 = originX + x1_mm * scale;
    const orig_y1 = originY - y1_mm * scale;
    const orig_x2 = originX + x2_mm * scale;
    const orig_y2 = originY - y2_mm * scale;

    const gap = 6, ext = 5; const dotR = 1.25;
    const textOffset = 10; const dir = Math.sign(offset_mm) || 1;

    if(!isVert) {
        custDx = 0; 
        const ay = orig_y1 - offset_mm * scale + custDy; 
        const minX = Math.min(orig_x1, orig_x2), maxX = Math.max(orig_x1, orig_x2);
        
        if (!hideLine) {
            outLine(orig_x1, orig_y1 - gap * dir, orig_x1, ay - ext * dir, 0.4); 
            outLine(orig_x2, orig_y2 - gap * dir, orig_x2, ay - ext * dir, 0.4);
            outLine(minX, ay, maxX, ay, 0.4); 
            outCircle(orig_x1, ay, dotR, 1, "#000", true); outCircle(orig_x2, ay, dotR, 1, "#000", true);
            
            if(!_isDXF && dimId) window.clickableDims.push({ id: dimId, type: 'line', isVert: false, x1: minX, x2: maxX, y: ay });
        }
        if (!hideText) {
            outText(text, (minX + maxX) / 2, ay - textOffset * dir, 12, 0, "#000", "center");
            if(!_isDXF && dimId) window.clickableDims.push({ id: dimId, type: 'text', cx: (minX + maxX) / 2, cy: ay - textOffset * dir, isVert: false });
        }
    } else {
        custDy = 0; 
        const ax = orig_x1 - offset_mm * scale + custDx; 
        const yBot = Math.max(orig_y1, orig_y2), yTop = Math.min(orig_y1, orig_y2);
        
        if (!hideLine) {
            outLine(orig_x1 - gap * dir, orig_y1, ax - ext * dir, orig_y1, 0.4); 
            outLine(orig_x2 - gap * dir, orig_y2, ax - ext * dir, orig_y2, 0.4);
            outLine(ax, yBot, ax, yTop, 0.4); 
            outCircle(ax, orig_y1, dotR, 1, "#000", true); outCircle(ax, orig_y2, dotR, 1, "#000", true);
            
            if(!_isDXF && dimId) window.clickableDims.push({ id: dimId, type: 'line', isVert: true, x: ax, y1: yTop, y2: yBot });
        }
        if (!hideText) {
            outText(text, ax - textOffset * dir, (yBot + yTop) / 2, 12, 90, "#000", "center");
            if(!_isDXF && dimId) window.clickableDims.push({ id: dimId, type: 'text', cx: ax - textOffset * dir, cy: (yBot + yTop) / 2, isVert: true });
        }
    }
}

function generateDrawing() {
    window.clickableDims = []; 
    const canvas = document.getElementById('previewCanvas'); const w = canvas.width, h = canvas.height;
    if(!_isDXF) { ctx.save(); ctx.setTransform(1, 0, 0, 1, 0, 0); ctx.clearRect(0, 0, w, h); ctx.translate(viewOffsetX, viewOffsetY); ctx.scale(viewZoom, viewZoom); }
    const v = getValues();
    if(!_isDXF) localStorage.setItem(STORAGE_KEY, JSON.stringify(getProjectData()));

    let S_den = 20; let match = v.scaleStr.match(/(\d+)\s*[\/:]\s*(\d+)/); if(match) S_den = parseFloat(match[2]) / parseFloat(match[1]);
    let scale = 1080 / (405 * S_den); 
    _dxfFactor = _isDXF ? 0.375 : 1.0; 
    lastScale = scale;
    
    const fCX = 350 + (v.offX * scale), fCY = 396 + (v.offY * scale);
    const oX = fCX - ((v.W + 630 + v.D) * scale) / 2, oY = fCY + ((v.H + 1030 + v.D) * scale) / 2 - 20;

    outRect(20, 20, w - 40, h - 40, 1.0); const ty = h - 65; outLine(20, ty, w - 20, ty, 1.0);
    outLine(240, ty, 240, h - 20, 1.0); outLine(560, ty, 560, h - 20, 1.0); outLine(760, ty, 760, h - 20, 1.0);
    outLine(820, ty, 820, h - 20, 1.0); outLine(930, ty, 930, h - 20, 1.0); outLine(1015, ty, 1015, h - 20, 1.0); 

    const midY = ty + 22.5; outText(v.compName, 20+110, midY, 14); outText(v.pjName, 255, midY, 12, 0, "#000", "left"); outText(v.dwgName, 575, midY, 12, 0, "#000", "left");
    outText(v.scaleStr, 790, midY, 11); outText(v.dateStr, 835, midY, 11, 0, "#000", "left"); outText(v.managerStr, 972, midY, 11); outText(v.dwgNoStr, 1050, midY, 12);
    
    line(0,0,v.W,0,1); line(0,v.H,v.W,v.H,1); line(0,0,0,v.H,1); line(v.W,0,v.W,v.H,1);
    line(v.TSL,0,v.TSL,v.H,0.6); line(v.W-v.TSR,0,v.W-v.TSR,v.H,0.6);
    line(v.TSL,v.TB,v.W-v.TSR,v.TB,0.6); line(v.TSL,v.H-v.TT,v.W-v.TSR,v.H-v.TT,0.6);
    if(v.useMid){ line(v.TSL, v.HM-v.TM/2, v.W-v.TSR, v.HM-v.TM/2, 0.6); line(v.TSL, v.HM+v.TM/2, v.W-v.TSR, v.HM+v.TM/2, 0.6); }

    const drawK = (yL, yH, nV, nH, ktv, kth) => {
        if(yH <= yL) return;
        const xG = (v.W - v.TSL - v.TSR) / (nV + 1);
        const yG = (yH - yL) / (nH + 1);

        for(let i=1; i<=nV; i++){ 
            let cx = v.TSL + xG*i; 
            line(cx-ktv/2, yL, cx-ktv/2, yH, 0.6); 
            line(cx+ktv/2, yL, cx+ktv/2, yH, 0.6); 
            if(i==1) outText(Math.round(ktv).toString(), oX + cx*scale, oY - (yH - 30)*scale, 11, 0, "#000");
        }

        if(nH > 0) { 
            for(let j=1; j<=nH; j++){ 
                let y = yL+yG*j; 
                let startX = v.TSL;
                for(let i=1; i<=nV; i++) {
                    let cx = v.TSL + xG*i;
                    line(startX, y-kth/2, cx-ktv/2, y-kth/2, 0.3); 
                    line(startX, y+kth/2, cx-ktv/2, y+kth/2, 0.3);
                    startX = cx+ktv/2;
                }
                line(startX, y-kth/2, v.W-v.TSR, y-kth/2, 0.3);
                line(startX, y+kth/2, v.W-v.TSR, y+kth/2, 0.3);
                if(j==1) outText(Math.round(kth).toString(), oX + (v.TSL + 25)*scale, oY - y*scale, 11, 90, "#000"); 
            } 
        }
    };
    if(v.useMid){ drawK(v.HM+v.TM/2, v.H-v.TT, v.stT, v.shT, v.ktv, v.kth); drawK(v.TB, v.HM-v.TM/2, v.stB, v.shB, v.ktv, v.kth); }
    else drawK(v.TB, v.H-v.TT, v.stT, v.shT, v.ktv, v.kth);

        outRect(oX + hx*scale, oY - (v.hikiY + v.hikiH/2)*scale, v.hikiW*scale, v.hikiH*scale, 1.0, "#c0392b");

    }

    v.openings.forEach((op, idx) => {
        const ox = oX + op.x * scale, oy = oY - op.y * scale, ow = op.w * scale, oh = op.h * scale;
        const m = op.m * scale; 
        
        if (op.type === 'rect') {
            outRect(ox, oy - oh, ow, oh, 1.0); 
            if(m > 0 && ow > 2*m && oh > 2*m) {

            outRect(ox, oy - oh, ow, oh, 1.0);

                outRect(ox + m, oy - oh + m, ow - 2*m, oh - 2*m, 0.6); 
                outLine(ox, oy - oh, ox + m, oy - oh + m, 0.4);

            drawDim(scale, oX, oY, op.x, op.y + op.h, op.x, op.y, opVertOffset, Math.round(op.h), true, `op_${idx}_l_h`);
        } else {

    });

    line(sx, v.TB, sx+v.D, v.TB, 0.6); line(sx, v.H-v.TT, sx+v.D, v.H-v.TT, 0.6);
    drawDim(scale, oX, oY, sx+v.D, v.TB, sx+v.D, 0, 100, Math.round(v.TB), true, "dim_s_b");
    drawDim(scale, oX, oY, sx+v.D, v.H, sx+v.D, v.H-v.TT, 100, Math.round(v.TT), true, "dim_s_t");
    drawDim(scale, oX, oY, sx, 0, sx+v.D, 0, -100, Math.round(v.D), false, "dim_s_w");

    const sX = w - 440, sY = 20, tW = 420, colW = 80, headerH = 28, rowH = 22;
    const totalSpecH = headerH + (v.specLabels.length * rowH) + 28;
    outRect(sX, sY, tW, totalSpecH, 0.5); outLine(sX, sY + headerH, sX + tW, sY + headerH, 0.5);
    outLine(sX + colW, sY, sX + colW, sY + headerH + (v.specLabels.length * rowH), 0.5);
    for(let i=1; i<=v.specLabels.length; i++) outLine(sX, sY + headerH + i*rowH, sX + tW, sY + headerH + i*rowH, 0.5);
    outText("名称", sX + colW/2, sY + headerH/2, 13); outText("仕上 ・ 金物", sX + colW + (tW-colW)/2, sY + headerH/2, 13);
    v.specLabels.forEach((l, i) => { outText(l, sX+colW/2, sY+headerH+i*rowH+rowH/2, 12); outText(v.specValues[i], sX+colW+10, sY+headerH+i*rowH+rowH/2, 12, 0, "#000", "left"); });
    outText(v.specNote, sX+10, sY+headerH+v.specLabels.length*rowH+14, 12, 0, "#c0392b", "left");

    v.extraTexts.forEach(et => {
        if(et.text.trim() === "") return;
        const tx = oX + et.x*scale, ty = oY - et.y*scale; 
        outText(et.text, tx, ty, 12, et.angle, "#000", "left");
        if(et.useArrow) {
            const ax = oX + et.ax*scale, ay = oY - et.ay*scale; outLine(tx, ty, ax, ay, 0.4);
            const headLen = 10*scale, angle = Math.atan2(ay-ty, ax-tx);
            outLine(ax, ay, ax - headLen*Math.cos(angle-Math.PI/6), ay - headLen*Math.sin(angle-Math.PI/6), 0.6);
            outLine(ax, ay, ax - headLen*Math.cos(angle+Math.PI/6), ay - headLen*Math.sin(angle+Math.PI/6), 0.6);
        }
    });
    if(!_isDXF) ctx.restore();
}

function drawPreview() { _isDXF = false; generateDrawing(); }
function resetViewAndPrint() { viewZoom = 1.0; viewOffsetX = 0; viewOffsetY = 0; drawPreview(); setTimeout(() => window.print(), 200); }
function exportDXF() { _isDXF = true; _dxfStr = "  0\r\nSECTION\r\n  2\r\nENTITIES\r\n"; generateDrawing(); _dxfStr += "  0\r\nENDSEC\r\n  0\r\nEOF\r\n"; _isDXF = false; const blob = new Blob([_dxfStr], { type: 'text/plain;charset=utf-8' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `建具図.dxf`; a.click(); }

// イベント (独立消しゴム＆安全なUndo対応)
document.addEventListener("DOMContentLoaded", () => {
    const canvas = document.getElementById('previewCanvas');
    let isDragging = false, dragStartX = 0, dragStartY = 0;
    let dragTargetText = null, dragTargetArrow = null, dragTargetOpening = null, dragTargetDim = null;
    
    canvas.addEventListener('mousedown', (e) => {
        const rect = canvas.getBoundingClientRect();
        const mx = (e.clientX - rect.left - viewOffsetX) / viewZoom, my = (e.clientY - rect.top - viewOffsetY) / viewZoom;
        const v = getValues();
        
        dragTargetText = null; dragTargetArrow = null; dragTargetOpening = null; dragTargetDim = null;
        
        for(let op of v.openings) { if (mx >= lastOriginX + op.x * lastScale && mx <= lastOriginX + (op.x + op.w) * lastScale && my >= lastOriginY - op.y * lastScale - op.h * lastScale && my <= lastOriginY - op.y * lastScale) { dragTargetOpening = op; break; } }
        if(!dragTargetOpening) { 
            for(let et of v.extraTexts) { 
                if(et.useArrow && Math.hypot(mx - (lastOriginX + et.ax * lastScale), my - (lastOriginY - et.ay * lastScale)) < 15) { 
                    dragTargetArrow = et; break; 
                } 
                if(Math.hypot(mx - (lastOriginX + et.x * lastScale), my - (lastOriginY - et.y * lastScale)) < 25) { 
                    dragTargetText = et; break; 
                } 
            } 
        }
        if(!dragTargetOpening && !dragTargetArrow && !dragTargetText) {
            for(let dim of window.clickableDims) {
                if (dim.type === 'text' && !window.hiddenDimTexts.includes(dim.id)) {
                    if (Math.hypot(mx - dim.cx, my - dim.cy) < 20) { dragTargetDim = dim; break; }
                }
                if (dim.type === 'line' && !window.hiddenDimLines.includes(dim.id)) {
                    if (!dim.isVert && Math.abs(my - dim.y) < 15 && mx >= dim.x1 - 5 && mx <= dim.x2 + 5) { dragTargetDim = dim; break; }
                    if (dim.isVert && Math.abs(mx - dim.x) < 15 && my >= dim.y1 - 5 && my <= dim.y2 + 5) { dragTargetDim = dim; break; }
                }
            }
        }
        
        if (isEraserMode) {
            let hitEraser = false;
            if (dragTargetDim) {
                if (dragTargetDim.type === 'text') {
                    if (!window.hiddenDimTexts.includes(dragTargetDim.id)) {
                        window.hiddenDimTexts.push(dragTargetDim.id);
                        window.eraserHistory.push({ type: 'dimText', id: dragTargetDim.id });
                    }
                } else {
                    if (!window.hiddenDimLines.includes(dragTargetDim.id)) {
                        window.hiddenDimLines.push(dragTargetDim.id);
                        window.eraserHistory.push({ type: 'dimLine', id: dragTargetDim.id });
                    }
                }
                hitEraser = true;
            } else if (dragTargetText || dragTargetArrow) {
                const target = dragTargetText || dragTargetArrow;
                const rowEl = target.rowEl;
                window.eraserHistory.push({ type: 'domNode', parent: rowEl.parentNode, nextSibling: rowEl.nextSibling, el: rowEl });
                rowEl.remove();
                hitEraser = true;
            } else if (dragTargetOpening) {
                const rowEl = dragTargetOpening.rowEl;
                window.eraserHistory.push({ type: 'domNode', parent: rowEl.parentNode, nextSibling: rowEl.nextSibling, el: rowEl });
                rowEl.remove();
                hitEraser = true;
            }

            dragTargetText = null; dragTargetArrow = null; dragTargetOpening = null; dragTargetDim = null;
            isDragging = true; 
            dragStartX = e.clientX; dragStartY = e.clientY;
            if (hitEraser) drawPreview();
            return;
        }

        isDragging = true; dragStartX = e.clientX; dragStartY = e.clientY;
    });
    
    canvas.addEventListener('mousemove', (e) => {
        if(!isDragging) return;
        const dx = (e.clientX - dragStartX) / viewZoom;
        const dy = (e.clientY - dragStartY) / viewZoom;
        const dxScale = dx / lastScale; 
        const dyScale = dy / lastScale;

        if(dragTargetOpening) { dragTargetOpening.x += dxScale; dragTargetOpening.y -= dyScale; dragTargetOpening.elX.value = Math.round(dragTargetOpening.x); dragTargetOpening.elY.value = Math.round(dragTargetOpening.y); drawPreview(); }
        else if(dragTargetArrow) { dragTargetArrow.ax += dxScale; dragTargetArrow.ay -= dyScale; dragTargetArrow.elAX.value = Math.round(dragTargetArrow.ax); dragTargetArrow.elAY.value = Math.round(dragTargetArrow.ay); drawPreview(); }
        else if(dragTargetText) { dragTargetText.x += dxScale; dragTargetText.y -= dyScale; dragTargetText.elX.value = Math.round(dragTargetText.x); dragTargetText.elY.value = Math.round(dragTargetText.y); drawPreview(); }
        else if(dragTargetDim) {
            window.customDimOffsets[dragTargetDim.id] = window.customDimOffsets[dragTargetDim.id] || {x: 0, y: 0};
            if (dragTargetDim.isVert) { window.customDimOffsets[dragTargetDim.id].x += dx; } 
            else { window.customDimOffsets[dragTargetDim.id].y += dy; }
            drawPreview();
        }
        else { viewOffsetX += e.clientX - dragStartX; viewOffsetY += e.clientY - dragStartY; drawPreview(); }
        
        dragStartX = e.clientX; dragStartY = e.clientY;
    });
    
    window.addEventListener('mouseup', () => { isDragging = false; dragTargetText = null; dragTargetArrow = null; dragTargetOpening = null; dragTargetDim = null; });
    canvas.addEventListener('wheel', (e) => { e.preventDefault(); const rect = canvas.getBoundingClientRect(); const mouseX = e.clientX - rect.left, mouseY = e.clientY - rect.top; const zoomFactor = e.deltaY < 0 ? 1.1 : 0.9; const worldX = (mouseX - viewOffsetX) / viewZoom, worldY = (mouseY - viewOffsetY) / viewZoom; viewZoom = Math.max(0.1, Math.min(viewZoom * zoomFactor, 10)); viewOffsetX = mouseX - worldX * viewZoom; viewOffsetY = mouseY - worldY * viewZoom; drawPreview(); }, { passive: false });
    canvas.addEventListener('dblclick', () => { viewZoom=1; viewOffsetX=0; viewOffsetY=0; drawPreview(); });
});
</script>
